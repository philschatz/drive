name: Tests

'on':
  push: null
  pull_request:

    null
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check (frontend)
        run: npx tsc -p tsconfig.client.json --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Build + Cypress e2e tests
        run: npm run test:cy